<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#b5261e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Japanese Grape Vine">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>The Japanese Grape Vine</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Zen+Old+Mincho:wght@400;700;900&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #12100e;
  --paper: #f7f2ea;
  --cream: #ede7d9;
  --red: #b5261e;
  --red-dim: rgba(181,38,30,0.12);
  --gold: #a07830;
  --gold-dim: rgba(160,120,48,0.1);
  --slate: #3a4a5a;
  --muted: #7a7060;
  --border: #d8cfc0;
  --correct: #2a6648;
  --wrong: #b5261e;
  --shadow-sm: 0 2px 8px rgba(18,16,14,0.08);
  --shadow-md: 0 6px 24px rgba(18,16,14,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inconsolata', monospace;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 60% at 15% 0%, rgba(160,120,48,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 90% 100%, rgba(181,38,30,0.04) 0%, transparent 60%);
}

/* ─── PAGE SYSTEM ─── */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; }

/* ════════════════════════════════════
   LOGIN PAGE
════════════════════════════════════ */
#loginPage {
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

.login-deco {
  position: absolute;
  font-family: 'Noto Serif JP', serif;
  font-size: 18rem;
  font-weight: 900;
  color: rgba(18,16,14,0.03);
  pointer-events: none;
  user-select: none;
  line-height: 1;
}
.login-deco.top { top: -3rem; right: -1rem; }
.login-deco.bot { bottom: -5rem; left: -2rem; transform: rotate(-8deg); }

.login-box {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 3rem 2.5rem;
  box-shadow: var(--shadow-md), 6px 8px 0 var(--cream);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 6px 6px 0 0;
}

.logo-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 4rem;
  font-weight: 900;
  color: var(--red);
  line-height: 1;
  display: block;
  margin-bottom: 0.25rem;
}

.logo-sub {
  font-family: 'Zen Old Mincho', serif;
  font-size: 0.72rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2.5rem;
  display: block;
}

.login-box label {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.login-box input {
  width: 100%;
  font-family: 'Zen Old Mincho', serif;
  font-size: 1.3rem;
  padding: 0.7rem 1rem;
  border: 1.5px solid var(--border);
  background: var(--paper);
  color: var(--ink);
  border-radius: 3px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1.5rem;
}
.login-box input:focus { border-color: var(--red); }

.login-existing {
  margin-bottom: 1.5rem;
}
.login-existing-label {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
  display: block;
}
.existing-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.existing-chip {
  font-family: 'Inconsolata', monospace;
  font-size: 0.78rem;
  padding: 0.3rem 0.75rem;
  border: 1px solid var(--border);
  background: var(--cream);
  color: var(--slate);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.existing-chip:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

.btn-primary {
  width: 100%;
  font-family: 'Inconsolata', monospace;
  font-size: 0.82rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.85rem;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--red); }

/* ════════════════════════════════════
   MAIN APP SHELL
════════════════════════════════════ */
.app-header {
  border-bottom: 1.5px solid var(--border);
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--red);
  letter-spacing: 0.05em;
}
.app-logo span {
  font-family: 'Inconsolata', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-left: 0.5rem;
  vertical-align: middle;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.user-pill {
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.user-pill strong {
  color: var(--ink);
  font-weight: 600;
}

.btn-sm {
  font-family: 'Inconsolata', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.35rem 0.85rem;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--red); color: var(--red); }

/* ════════════════════════════════════
   DASHBOARD
════════════════════════════════════ */
#dashPage .page-body {
  max-width: 820px;
  margin: 0 auto;
  padding: 2rem 1rem 3rem;
  width: 100%;
}

.welcome-banner {
  margin-bottom: 2rem;
}
.welcome-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
}
.welcome-sub {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-top: 0.25rem;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-bottom: 2.5rem;
}

.stat-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 1.1rem 1.2rem;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--red);
  line-height: 1;
}
.stat-label {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 0.3rem;
}

.section-title {
  font-family: 'Zen Old Mincho', serif;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}

/* Lesson categories */
.categories {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.category-block {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.category-header {
  padding: 1rem 1.4rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid var(--border);
  background: var(--paper);
}

.cat-icon {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  color: var(--red);
  min-width: 2rem;
  text-align: center;
}
.cat-title {
  font-family: 'Zen Old Mincho', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
}
.cat-desc {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 0.1rem;
  letter-spacing: 0.05em;
}

.lesson-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0;
}

.lesson-btn {
  border: none;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: #fff;
  padding: 1rem 1.2rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.lesson-btn:hover {
  background: var(--gold-dim);
}
.lesson-btn:last-child, .lesson-btn:nth-child(even):last-child { border-right: none; }

.lesson-name {
  font-family: 'Zen Old Mincho', serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--ink);
  display: block;
}
.lesson-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.1rem;
  color: var(--red);
  display: block;
  margin: 0.15rem 0;
}
.lesson-count {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.lesson-score-badge {
  position: absolute;
  top: 0.6rem;
  right: 0.6rem;
  font-size: 0.65rem;
  padding: 0.15rem 0.45rem;
  border-radius: 2px;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.badge-good { background: rgba(42,102,72,0.12); color: var(--correct); }
.badge-mid  { background: rgba(160,120,48,0.12); color: var(--gold); }
.badge-low  { background: rgba(181,38,30,0.1); color: var(--wrong); }

/* ════════════════════════════════════
   QUIZ PAGE
════════════════════════════════════ */
#quizPage .page-body {
  max-width: 580px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
  width: 100%;
}

.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.quiz-lesson-title {
  font-family: 'Zen Old Mincho', serif;
  font-size: 0.88rem;
  color: var(--ink);
  font-weight: 700;
}
.quiz-lesson-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  color: var(--muted);
}

.progress-track {
  height: 3px;
  background: var(--cream);
  border-radius: 2px;
  margin-bottom: 1.75rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--gold));
  transition: width 0.45s ease;
  border-radius: 2px;
}

.q-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  padding: 2.5rem 2rem 2rem;
  text-align: center;
  box-shadow: var(--shadow-md), 5px 7px 0 var(--cream);
  position: relative;
  animation: cardIn 0.3s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.99); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.q-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 5px 5px 0 0;
}

.q-num {
  font-size: 0.68rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
}

.type-tag {
  display: inline-block;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.18rem 0.6rem;
  border-radius: 2px;
  border: 1px solid currentColor;
  margin-bottom: 1.25rem;
}
.tag-hiragana { color: #8b4513; }
.tag-katakana { color: #1a4b8b; }
.tag-kanji    { color: #4b0082; }
.tag-vocab    { color: #2a6648; }
.tag-grammar  { color: #6b4a00; }

.char-main {
  font-family: 'Noto Serif JP', serif;
  font-size: 6rem;
  font-weight: 700;
  line-height: 1.05;
  color: var(--ink);
  margin-bottom: 0.25rem;
  transition: transform 0.2s;
}
.char-main.small-char { font-size: 2.2rem; line-height: 1.4; }

.char-hint {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 0.25rem;
}
.char-prompt {
  font-family: 'Zen Old Mincho', serif;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
}

/* Choices */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.65rem;
}

.choice {
  font-family: 'Zen Old Mincho', serif;
  font-size: 0.92rem;
  padding: 0.85rem 0.75rem;
  border: 1.5px solid var(--border);
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  line-height: 1.35;
  text-align: center;
}
.choice:hover:not(:disabled) {
  border-color: var(--gold);
  background: var(--gold-dim);
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.06);
}
.choice .c-jp { font-family: 'Noto Serif JP', serif; font-size: 1.3rem; display: block; }
.choice .c-en { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 0.15rem; }
.choice.correct { background: rgba(42,102,72,0.1); border-color: var(--correct); color: var(--correct); }
.choice.wrong   { background: rgba(181,38,30,0.08); border-color: var(--wrong); color: var(--wrong); }
.choice:disabled { cursor: default; }

.q-feedback {
  margin-top: 1.25rem;
  min-height: 1.8rem;
  font-family: 'Zen Old Mincho', serif;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 0.25s;
}
.q-feedback.show { opacity: 1; }
.q-feedback.ok  { color: var(--correct); }
.q-feedback.bad { color: var(--wrong); }

.next-btn {
  margin-top: 1.25rem;
  font-family: 'Inconsolata', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 0.6rem 2rem;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
}
.next-btn.show { opacity: 1; pointer-events: auto; }
.next-btn:hover { background: var(--red); }

/* ════════════════════════════════════
   RESULTS
════════════════════════════════════ */
.result-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  padding: 3rem 2rem;
  text-align: center;
  box-shadow: var(--shadow-md);
  animation: fadeUp 0.4s ease both;
}
.result-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.5rem;
  color: var(--red);
  line-height: 1.1;
}
.result-score-big {
  font-family: 'Noto Serif JP', serif;
  font-size: 3rem;
  font-weight: 900;
  color: var(--ink);
  margin: 0.75rem 0 0.25rem;
}
.result-pct { color: var(--red); }
.result-msg {
  font-family: 'Zen Old Mincho', serif;
  font-size: 1rem;
  color: var(--muted);
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
}
.result-breakdown {
  display: flex;
  justify-content: center;
  gap: 2rem;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 2rem;
}
.result-breakdown strong { color: var(--ink); font-size: 1.1rem; }
.result-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

.btn-red {
  font-family: 'Inconsolata', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.7rem 1.8rem;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-red:hover { background: var(--ink); }

.btn-outline {
  font-family: 'Inconsolata', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.7rem 1.8rem;
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--border);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-outline:hover { border-color: var(--ink); }

/* ── Responsive ── */
@media (max-width: 500px) {
  .char-main { font-size: 4.5rem; }
  .login-box { padding: 2rem 1.5rem; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginPage" class="page active">
  <div class="login-deco top">日</div>
  <div class="login-deco bot">語</div>
  <div class="login-box">
    <span class="logo-char">日本語</span>
    <span class="logo-sub">The Japanese Grape Vine · Enter your name</span>

    <div id="existingSection" style="display:none">
      <span class="login-existing-label">Continue as…</span>
      <div class="existing-list" id="existingList"></div>
      <div style="height:1rem"></div>
    </div>

    <label for="nameInput">Your name</label>
    <input type="text" id="nameInput" placeholder="e.g. Sakura" maxlength="30" autocomplete="off" />
    <button class="btn-primary" onclick="doLogin()">始める — Begin</button>
  </div>
</div>

<!-- ══════════════════ DASHBOARD ══════════════════ -->
<div id="dashPage" class="page">
  <header class="app-header">
    <div class="app-logo">日本語 <span>Study App</span></div>
    <div class="header-right">
      <div class="user-pill">こんにちは、<strong id="headerName"></strong></div>
      <button class="btn-sm" onclick="goToLogin()">Switch User</button>
    </div>
  </header>
  <div class="page-body">
    <div class="welcome-banner">
      <div class="welcome-jp" id="welcomeJP">おかえり！</div>
      <div class="welcome-sub" id="welcomeSub">Choose a lesson to practice</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Questions Done</div></div>
      <div class="stat-card"><div class="stat-num" id="statCorrect">0</div><div class="stat-label">Correct</div></div>
      <div class="stat-card"><div class="stat-num" id="statPct">—</div><div class="stat-label">Accuracy</div></div>
      <div class="stat-card"><div class="stat-num" id="statLessons">0</div><div class="stat-label">Lessons Done</div></div>
    </div>
    <div class="section-title">Study Books</div>
    <div style="display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap" id="bookTabRow">
      <button id="tabAll" onclick="filterBook('all')" style="font-family:'Inconsolata',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:.45rem 1rem;border:1.5px solid #12100e;background:#12100e;color:#f7f2ea;cursor:pointer;border-radius:2px">All Books</button>
      <button id="tabJBP" onclick="filterBook('jbp')" style="font-family:'Inconsolata',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:.45rem 1rem;border:1.5px solid #d8cfc0;background:transparent;color:#7a7060;cursor:pointer;border-radius:2px">Japanese for Busy People</button>
      <button id="tabKJW" onclick="filterBook('kjw')" style="font-family:'Inconsolata',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:.45rem 1rem;border:1.5px solid #d8cfc0;background:transparent;color:#7a7060;cursor:pointer;border-radius:2px">The Kanji Way</button>
    </div>
    <div class="categories" id="categoriesEl"></div>
  </div>
</div>

<!-- ══════════════════ QUIZ ══════════════════ -->
<div id="quizPage" class="page">
  <header class="app-header">
    <div class="app-logo">日本語 <span>Study App</span></div>
    <div class="header-right">
      <button class="btn-sm" onclick="goToDash()">← Back</button>
    </div>
  </header>
  <div class="page-body">

// ══════════════════════════════════════════════
//  STORAGE HELPERS
// ══════════════════════════════════════════════
function loadDB() {
  try { return JSON.parse(localStorage.getItem('jpGrapeVineDB') || '{}'); } catch(e) { return {}; }
}
function saveDB(db) {
  try { localStorage.setItem('jpGrapeVineDB', JSON.stringify(db)); } catch(e) {}
}

function getUsers() {
  const db = loadDB();
  return db.users || {};
}

function getUserData(name) {
  const db = loadDB();
  return (db.users || {})[name] || { name, totalQ:0, totalCorrect:0, lessons:{} };
}

function saveUserData(data) {
  const db = loadDB();
  if (!db.users) db.users = {};
  db.users[data.name] = data;
  saveDB(db);
}

// ══════════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════════
let currentUser = null;
let activeBookFilter = "all";
let currentLesson = null;
let quizQueue = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizWrong = 0;
let answered = false;

// ══════════════════════════════════════════════
//  PAGE NAVIGATION
// ══════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════════
function initLogin() {
  const users = getUsers();
  const names = Object.keys(users);
  const secEl = document.getElementById('existingSection');
  const listEl = document.getElementById('existingList');
  listEl.innerHTML = '';
  if (names.length > 0) {
    secEl.style.display = '';
    names.forEach(n => {
      const chip = document.createElement('button');
      chip.className = 'existing-chip';
      chip.textContent = n;
      chip.onclick = () => { document.getElementById('nameInput').value = n; doLogin(); };
      listEl.appendChild(chip);
    });
  } else {
    secEl.style.display = 'none';
  }
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
}

function doLogin() {
  const raw = document.getElementById('nameInput').value.trim();
  if (!raw) return;
  currentUser = getUserData(raw);
  renderDash();
  showPage('dashPage');
}

function goToLogin() {
  showPage('loginPage');
  initLogin();
}

// ══════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════
function renderDash() {
  const u = currentUser;
  document.getElementById('headerName').textContent = u.name;

  // welcome text
  const isNew = u.totalQ === 0;
  document.getElementById('welcomeJP').textContent = isNew ? 'ようこそ！' : 'おかえり！';
  document.getElementById('welcomeSub').textContent = isNew
    ? `Welcome, ${u.name}! Choose a lesson to begin.`
    : `Welcome back, ${u.name}! Keep going!`;

  // stats
  document.getElementById('statTotal').textContent = u.totalQ;
  document.getElementById('statCorrect').textContent = u.totalCorrect;
  const pct = u.totalQ > 0 ? Math.round(u.totalCorrect / u.totalQ * 100) + '%' : '—';
  document.getElementById('statPct').textContent = pct;
  const doneCount = Object.values(u.lessons).filter(l => l.attempts > 0).length;
  document.getElementById('statLessons').textContent = doneCount;

  renderCategories();
}

function renderCategories() {
  const u = currentUser;
  const catEl = document.getElementById('categoriesEl');
  catEl.innerHTML = '';
  const filtered = activeBookFilter === 'all' ? LESSONS : LESSONS.filter(c => c.book === activeBookFilter);
  filtered.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'category-block';
    const bookBadge = cat.book === 'jbp'
      ? '<span style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.15rem .5rem;border-radius:2px;background:rgba(26,75,139,.12);color:#1a4b8b;margin-left:.5rem">JBP</span>'
      : '<span style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.15rem .5rem;border-radius:2px;background:rgba(75,0,130,.12);color:#4b0082;margin-left:.5rem">Kanji Way</span>';
    const borderColor = cat.book === 'jbp' ? '#1a4b8b' : '#4b0082';
    block.innerHTML = `
      <div class="category-header" style="border-left:4px solid ${borderColor}">
        <div class="cat-icon">${cat.catIcon}</div>
        <div>
          <div class="cat-title">${cat.category} ${bookBadge} <span style="font-family:'Noto Serif JP',serif;font-size:.82rem;color:var(--muted)">${cat.catJP}</span></div>
          <div class="cat-desc">${cat.catDesc}</div>
        </div>
      </div>
      <div class="lesson-grid" id="grid-${cat.category.replace(/\s/g,'_')}"></div>
    `;
    catEl.appendChild(block);
    const grid = block.querySelector('.lesson-grid');
    cat.items.forEach(lesson => {
      const ls = u.lessons[lesson.id];
      const btn = document.createElement('button');
      btn.className = 'lesson-btn';
      let badge = '';
      if (ls && ls.attempts > 0) {
        const p = Math.round(ls.correct / ls.total * 100);
        const cls = p >= 80 ? 'badge-good' : p >= 50 ? 'badge-mid' : 'badge-low';
        badge = `<span class="lesson-score-badge ${cls}">${p}%</span>`;
      }
      btn.innerHTML = `${badge}
        <span class="lesson-name">${lesson.name}</span>
        <span class="lesson-jp">${lesson.jp}</span>
        <span class="lesson-count">${lesson.data.length} items · ${lesson.desc}</span>`;
      btn.onclick = () => startLesson(lesson);
      grid.appendChild(btn);
    });
  });
}

function goToDash() {
  renderDash();
  showPage('dashPage');
}

// ══════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startLesson(lesson) {
  currentLesson = lesson;
  quizQueue = shuffle(lesson.data).slice(0, Math.min(10, lesson.data.length));
  quizIndex = 0;
  quizCorrect = 0;
  quizWrong = 0;
  answered = false;

  document.getElementById('quizLessonTitle').textContent = lesson.name;
  document.getElementById('quizLessonJP').textContent = lesson.jp;
  document.getElementById('qTotalDisp').textContent = quizQueue.length;

  showPage('quizPage');
  renderQuestion();
}

function typeTagClass(type) {
  const map = { hiragana:'tag-hiragana', katakana:'tag-katakana', kanji:'tag-kanji', vocab:'tag-vocab', grammar:'tag-grammar' };
  return map[type] || 'tag-vocab';
}

function renderQuestion() {
  const item = quizQueue[quizIndex];
  const lesson = currentLesson;
  answered = false;

  document.getElementById('qNumDisp').textContent = quizIndex + 1;
  const pct = (quizIndex / quizQueue.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // build wrong choices from same lesson pool
  let others = currentLesson.data.filter(x => x.q !== item.q);
  others = shuffle(others).slice(0, 3);
  const allChoices = shuffle([item, ...others]);

  const isSmall = item.q.length > 4;

  let promptText = '';
  if (lesson.prompt === 'romaji') promptText = 'Select the correct romaji reading';
  else if (lesson.prompt === 'meaning') promptText = 'Select the correct meaning';

  const wrap = document.getElementById('qCardWrap');
  wrap.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `
    <div class="q-num">Question ${quizIndex + 1} of ${quizQueue.length}</div>
    <span class="type-tag ${typeTagClass(lesson.type)}">${lesson.type}</span>
    <div class="char-main${isSmall ? ' small-char' : ''}">${item.q}</div>
    <div class="char-hint">${item.hint || ''}</div>
    <div class="char-prompt">${promptText}</div>
    <div class="choices" id="choicesEl"></div>
    <div class="q-feedback" id="feedbackEl"></div>
    <button class="next-btn" id="nextBtn" onclick="advanceQuiz()">
      ${quizIndex + 1 < quizQueue.length ? 'Next →' : 'See Results'}
    </button>
  `;
  wrap.appendChild(card);

  const choicesEl = document.getElementById('choicesEl');
  allChoices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    // display answer text
    const displayText = lesson.prompt === 'romaji' ? ch.a : (ch.a.length > 30 ? ch.a : ch.a);
    btn.innerHTML = `<span class="c-en">${displayText}</span>`;
    btn.onclick = () => checkAnswer(btn, ch, item);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(btn, choice, item) {
  if (answered) return;
  answered = true;

  const isCorrect = choice.q === item.q;
  const fb = document.getElementById('feedbackEl');

  // mark buttons
  document.querySelectorAll('.choice').forEach(b => {
    b.disabled = true;
    const label = b.querySelector('.c-en').textContent;
    if (label === item.a) b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    quizCorrect++;
    fb.textContent = '✓ 正解！ Correct!';
    fb.className = 'q-feedback show ok';
  } else {
    btn.classList.add('wrong');
    quizWrong++;
    fb.textContent = `✗ Answer: ${item.a}`;
    fb.className = 'q-feedback show bad';
  }

  document.getElementById('nextBtn').classList.add('show');
}

function advanceQuiz() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const total = quizQueue.length;
  const pct = Math.round(quizCorrect / total * 100);

  // save to user data
  const ls = currentUser.lessons[currentLesson.id] || { attempts:0, correct:0, total:0 };
  ls.attempts++;
  ls.correct += quizCorrect;
  ls.total += total;
  currentUser.lessons[currentLesson.id] = ls;
  currentUser.totalQ += total;
  currentUser.totalCorrect += quizCorrect;
  saveUserData(currentUser);

  let jpMsg = '', enMsg = '';
  if (pct === 100) { jpMsg = '完璧！'; enMsg = 'Perfect score — outstanding!'; }
  else if (pct >= 80) { jpMsg = 'よくできました！'; enMsg = 'Great work! Keep it up.'; }
  else if (pct >= 60) { jpMsg = 'まあまあです'; enMsg = 'Good effort — review and try again!'; }
  else { jpMsg = 'がんばれ！'; enMsg = 'Don\'t give up — practice makes perfect!'; }

  document.getElementById('progressFill').style.width = '100%';

  const wrap = document.getElementById('qCardWrap');
  wrap.innerHTML = `
    <div class="result-card">
      <div class="result-jp">${jpMsg}</div>
      <div class="result-score-big">${quizCorrect}/${total} <span class="result-pct">${pct}%</span></div>
      <div class="result-msg">${enMsg}</div>
      <div class="result-breakdown">
        <span>✓ Correct <strong>${quizCorrect}</strong></span>
        <span>✗ Wrong <strong>${quizWrong}</strong></span>
        <span>Accuracy <strong>${pct}%</strong></span>
      </div>
      <div class="result-actions">
        <button class="btn-red" onclick="startLesson(currentLesson)">Try Again</button>
        <button class="btn-outline" onclick="goToDash()">← All Lessons</button>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════

initLogin();
</script>

<div id="installBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:#fff;border-top:1.5px solid #d8cfc0;padding:1rem 1.25rem;
  align-items:center;justify-content:space-between;gap:1rem;box-shadow:0 -4px 20px rgba(18,16,14,.12);">

    <div style="font-family:'Zen Old Mincho',serif;font-size:.92rem;font-weight:700;color:#12100e">Install The Japanese Grape Vine</div>
    <div style="font-size:.72rem;color:#7a7060;letter-spacing:.05em;margin-top:.15rem">Add to home screen for offline access</div>
  </div>
  <div style="display:flex;gap:.5rem;flex-shrink:0">
    <button onclick="dismissInstall()" style="font-family:'Inconsolata',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:.45rem .9rem;border:1.5px solid #d8cfc0;background:transparent;color:#7a7060;cursor:pointer;border-radius:2px">Later</button>
    <button onclick="doInstall()" style="font-family:'Inconsolata',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:.45rem 1rem;background:#b5261e;color:#fff;border:none;cursor:pointer;border-radius:2px">Install</button>
  </div>
</div>
<script>
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBanner').style.display = 'flex'; });
function doInstall() { if(!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); }); }
function dismissInstall() { document.getElementById('installBanner').style.display = 'none'; }
window.addEventListener('appinstalled', () => dismissInstall());
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => {}); }); }
</script>
